<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aana Khanduri — Field Notebook · Vol. I</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;1,400;1,500&family=Inter:wght@300;400;500&family=JetBrains+Mono:wght@400;500&display=swap">

<style>
:root {
  /* base — warm pastel dreamscape */
  --paper: #F8F2EA;       /* warm ivory background */
  --paper-2: #F0E8DC;     /* deeper paper for depth */
  --blush: #F2D5D2;
  --lavender: #DCD3E8;
  --peach: #F5D5BC;
  --buttercream: #F4E5C8;
  --misty: #D8DDE2;
  --apricot: #F2C9A8;

  /* anchor — cocoa */
  --cocoa: #5C4A40;
  --cocoa-2: #6E5848;
  --cocoa-3: #8A7060;
  --cocoa-soft: rgba(92,74,64,0.55);
  --cocoa-faint: rgba(92,74,64,0.32);

  /* orb tones — sun through fog */
  --orb-core: #FBE8C8;
  --orb-mid: #F5D2A6;
  --orb-edge: #F2C9A8;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { cursor: none; height: 100%; }
body {
  font-family: 'Inter', -apple-system, sans-serif;
  background: var(--paper);
  color: var(--cocoa);
  min-height: 100vh;
  overflow: hidden;
  position: relative;
  font-weight: 400;
  letter-spacing: 0.005em;
}

/* ===== ATMOSPHERE LAYERS ===== */
/* base ambient gradient: warmer in upper-left where the sun is, cooler bottom */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse 80% 70% at 78% 18%, rgba(245,210,166,0.40) 0%, transparent 55%),
    radial-gradient(ellipse 100% 80% at 12% 90%, rgba(220,211,232,0.32) 0%, transparent 60%),
    radial-gradient(ellipse 60% 50% at 50% 50%, rgba(244,229,200,0.18) 0%, transparent 70%);
  pointer-events: none;
  z-index: 1;
}

/* faint paper noise texture */
body::after {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    radial-gradient(circle at 20% 30%, rgba(140,110,90,0.025) 1px, transparent 2px),
    radial-gradient(circle at 70% 60%, rgba(140,110,90,0.02) 1px, transparent 2px),
    radial-gradient(circle at 40% 80%, rgba(140,110,90,0.025) 1px, transparent 2px);
  background-size: 80px 80px, 120px 120px, 100px 100px;
  pointer-events: none;
  z-index: 1;
  opacity: 0.6;
}

/* ===== ORB (sun through fog, upper right) ===== */
.orb-wrap {
  position: fixed;
  top: 8%;
  right: 12%;
  width: 480px;
  height: 480px;
  z-index: 2;
  pointer-events: none;
  animation: orb-breathe 7s ease-in-out infinite;
}
@keyframes orb-breathe {
  0%, 100% { transform: scale(1); opacity: 0.92; }
  50%      { transform: scale(1.04); opacity: 1; }
}
/* outer hazy halo */
.orb-halo {
  position: absolute;
  inset: 0;
  border-radius: 50%;
  background: radial-gradient(circle at 50% 50%,
    rgba(251,232,200,0.55) 0%,
    rgba(245,210,166,0.32) 28%,
    rgba(242,201,168,0.18) 50%,
    rgba(242,201,168,0.05) 70%,
    transparent 85%);
  filter: blur(20px);
}
/* mid layer */
.orb-mid {
  position: absolute;
  top: 22%; left: 22%;
  width: 56%; height: 56%;
  border-radius: 50%;
  background: radial-gradient(circle at 45% 45%,
    rgba(251,232,200,0.85) 0%,
    rgba(245,210,166,0.5) 40%,
    rgba(242,201,168,0.18) 70%,
    transparent 90%);
  filter: blur(8px);
}
/* core */
.orb-core {
  position: absolute;
  top: 38%; left: 38%;
  width: 24%; height: 24%;
  border-radius: 50%;
  background: radial-gradient(circle at 45% 45%,
    rgba(255,245,225,0.95) 0%,
    rgba(251,232,200,0.65) 50%,
    rgba(245,210,166,0.25) 85%,
    transparent 100%);
  filter: blur(2px);
  animation: orb-glow 4.5s ease-in-out infinite;
}
@keyframes orb-glow {
  0%, 100% { opacity: 0.95; }
  50%      { opacity: 0.75; }
}

/* secondary smaller orb, bottom-left, mostly off-screen */
.orb-secondary {
  position: fixed;
  bottom: -180px;
  left: -120px;
  width: 380px;
  height: 380px;
  border-radius: 50%;
  background: radial-gradient(circle at 60% 40%,
    rgba(220,211,232,0.40) 0%,
    rgba(220,211,232,0.20) 40%,
    transparent 70%);
  filter: blur(30px);
  z-index: 1;
  pointer-events: none;
  animation: orb-breathe 9s ease-in-out infinite;
  animation-delay: 2s;
}

/* ===== PARTICLES (dust motes) ===== */
.particles {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 3;
}
.dust {
  position: absolute;
  border-radius: 50%;
  background: rgba(140,110,90,0.40);
  animation: dust-drift var(--dur) ease-in-out infinite;
  animation-delay: var(--delay);
}
@keyframes dust-drift {
  0%   { transform: translate(0, 0); opacity: var(--opa); }
  25%  { transform: translate(var(--dx1), var(--dy1)); opacity: calc(var(--opa) * 0.7); }
  50%  { transform: translate(var(--dx2), var(--dy2)); opacity: var(--opa); }
  75%  { transform: translate(var(--dx3), var(--dy3)); opacity: calc(var(--opa) * 0.6); }
  100% { transform: translate(0, 0); opacity: var(--opa); }
}

/* petals */
.petal {
  position: absolute;
  pointer-events: none;
  animation: petal-fall var(--dur) cubic-bezier(0.45,0.05,0.55,0.95) infinite;
  animation-delay: var(--delay);
  opacity: 0;
}
@keyframes petal-fall {
  0%   { transform: translate(0, -40px) rotate(0deg); opacity: 0; }
  10%  { opacity: 0.65; }
  85%  { opacity: 0.55; }
  100% { transform: translate(var(--dx), 100vh) rotate(var(--rot)); opacity: 0; }
}

/* ===== CURSOR (PEARL/IVORY GLOWING) ===== */
.cursor-dot {
  position: fixed;
  pointer-events: none;
  z-index: 9999;
  width: 14px;
  height: 14px;
  background: rgba(248,242,234,0.92);
  border-radius: 50%;
  margin-left: -7px;
  margin-top: -7px;
  transition: width 0.4s cubic-bezier(0.22,1,0.36,1),
              height 0.4s cubic-bezier(0.22,1,0.36,1),
              padding 0.4s,
              border-radius 0.4s,
              background 0.3s,
              color 0.3s;
  box-shadow:
    0 0 14px rgba(245,210,166,0.65),
    0 0 32px rgba(245,213,188,0.40),
    0 0 64px rgba(242,201,168,0.18);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'JetBrains Mono', monospace;
  font-size: 0;
  color: transparent;
  white-space: nowrap;
  overflow: hidden;
  letter-spacing: 0.06em;
  font-weight: 500;
}
.cursor-dot.expanded {
  width: auto;
  height: auto;
  padding: 14px 26px;
  border-radius: 999px;
  font-size: 11px;
  color: var(--paper);
  background: var(--cocoa);
  margin-left: 0;
  margin-top: 0;
  box-shadow: 0 6px 22px rgba(92,74,64,0.30);
}

/* ===== CENTER CONTENT ===== */
.stage {
  position: fixed;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  z-index: 5;
  padding: 0 24px;
}
.stack {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 28px;
  max-width: 760px;
  text-align: center;
}

.eyebrow {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  letter-spacing: 0.34em;
  text-transform: uppercase;
  color: var(--cocoa-soft);
  animation: fade-up 1.6s cubic-bezier(0.22,1,0.36,1) 0.2s backwards;
}

.headline {
  font-family: 'Lora', serif;
  font-weight: 400;
  font-size: 96px;
  line-height: 1.02;
  letter-spacing: -0.022em;
  color: var(--cocoa);
  animation: fade-up 1.8s cubic-bezier(0.22,1,0.36,1) 0.5s backwards;
  /* container for letter spans */
}
.headline em {
  font-style: italic;
  color: var(--cocoa-2);
}
.headline .ch,
.quote .ch {
  display: inline-block;
  transition: transform 0.85s cubic-bezier(0.22,1,0.36,1),
              filter 0.85s cubic-bezier(0.22,1,0.36,1),
              opacity 0.85s cubic-bezier(0.22,1,0.36,1);
  will-change: transform, filter, opacity;
}
.headline .ch.space,
.quote .ch.space {
  width: 0.32em;
}

.quote {
  font-family: 'Lora', serif;
  font-style: italic;
  font-size: 19px;
  line-height: 1.55;
  color: var(--cocoa-2);
  max-width: 560px;
  letter-spacing: 0.005em;
  animation: fade-up 1.8s cubic-bezier(0.22,1,0.36,1) 0.95s backwards;
  margin-top: -4px;
}

/* tiny spacer / dot accent */
.spacer-dot {
  width: 4px;
  height: 4px;
  border-radius: 50%;
  background: var(--cocoa-faint);
  margin: 4px auto 0;
  animation: fade-up 1.6s cubic-bezier(0.22,1,0.36,1) 1.3s backwards;
}

.cta {
  margin-top: 16px;
  border: 1px solid var(--cocoa-soft);
  background: rgba(248,242,234,0.6);
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
  color: var(--cocoa);
  padding: 17px 36px;
  border-radius: 999px;
  font-family: 'Inter', sans-serif;
  font-weight: 500;
  font-size: 15px;
  letter-spacing: 0.015em;
  cursor: none;
  transition: all 0.5s cubic-bezier(0.22,1,0.36,1);
  display: inline-flex;
  align-items: center;
  gap: 14px;
  text-decoration: none;
  animation: fade-up 1.6s cubic-bezier(0.22,1,0.36,1) 1.5s backwards,
             cta-breath 5s ease-in-out 3s infinite;
}
.cta::after {
  content: '→';
  font-style: normal;
  font-size: 16px;
  transition: transform 0.5s cubic-bezier(0.22,1,0.36,1);
}
.cta:hover {
  background: var(--cocoa);
  color: var(--paper);
  border-color: var(--cocoa);
  transform: translateY(-3px);
  box-shadow: 0 14px 36px rgba(92,74,64,0.18);
}
.cta:hover::after { transform: translateX(8px); }
@keyframes cta-breath {
  0%, 100% { box-shadow: 0 0 0 rgba(92,74,64,0); }
  50%      { box-shadow: 0 8px 28px rgba(92,74,64,0.10); }
}

@keyframes fade-up {
  0%   { opacity: 0; transform: translateY(16px); }
  100% { opacity: 1; transform: translateY(0); }
}

/* ===== FOOTER META ===== */
.foot-l {
  position: fixed;
  bottom: 32px;
  left: 36px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.14em;
  color: var(--cocoa-soft);
  z-index: 5;
  animation: fade-up 2s cubic-bezier(0.22,1,0.36,1) 1.8s backwards;
}
.foot-l .clock {
  display: block;
  font-size: 13px;
  color: var(--cocoa);
  letter-spacing: 0.06em;
  margin-bottom: 8px;
  font-weight: 500;
}
.foot-l .status {
  display: flex;
  align-items: center;
  gap: 8px;
  text-transform: uppercase;
}
.foot-l .dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--cocoa-2);
  animation: status-blink 3s ease-in-out infinite;
}
@keyframes status-blink {
  0%, 100% { opacity: 1; transform: scale(1); }
  50%      { opacity: 0.35; transform: scale(0.7); }
}
.foot-r {
  position: fixed;
  bottom: 32px;
  right: 36px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.14em;
  color: var(--cocoa-soft);
  z-index: 5;
  text-align: right;
  text-transform: uppercase;
  animation: fade-up 2s cubic-bezier(0.22,1,0.36,1) 2s backwards;
  line-height: 1.7;
}

/* ===== MOBILE ===== */
@media (max-width: 768px) {
  html, body { cursor: auto; overflow-y: auto; }
  .cursor-dot { display: none; }
  .cta { cursor: pointer; }
  .headline { font-size: 56px; }
  .quote { font-size: 16px; }
  .eyebrow { font-size: 10px; letter-spacing: 0.24em; }
  .orb-wrap { width: 280px; height: 280px; top: 4%; right: 4%; }
  .foot-l, .foot-r { font-size: 9px; }
}
</style>
</head>
<body>

<!-- orbs -->
<div class="orb-wrap">
  <div class="orb-halo"></div>
  <div class="orb-mid"></div>
  <div class="orb-core"></div>
</div>
<div class="orb-secondary"></div>

<!-- particles -->
<div class="particles" id="particles"></div>

<!-- cursor -->
<div class="cursor-dot" id="cursor"></div>

<!-- center content -->
<div class="stage">
  <div class="stack">
    <div class="eyebrow">the field notebook of</div>

    <h1 class="headline" id="headline" data-text="Aana Khanduri"></h1>

    <p class="quote" id="quote" data-text="Following quiet curiosities into thoughtful products."></p>

    <div class="spacer-dot"></div>

    <a href="#" class="cta" id="cta" data-cursor data-cursor-text="enter">come on in</a>
  </div>
</div>

<!-- foot -->
<div class="foot-l">
  <span class="clock" id="clock">—:—:—</span>
  <span class="status">
    <span class="dot"></span>
    <span>writing notebook · vol. i</span>
  </span>
</div>
<div class="foot-r">
  san francisco<br>
  37.77° N · 122.42° W
</div>

<script>
// ============ DUST MOTES + PETALS ============
const particles = document.getElementById('particles');
const numDust = 90;
const numPetals = 7;

// Tints for dust — most subtle cocoa, some warmer apricot, some lavender
const dustTints = [
  'rgba(140,110,90,0.42)',    // cocoa
  'rgba(140,110,90,0.32)',
  'rgba(180,150,130,0.42)',   // lighter cocoa
  'rgba(216,174,137,0.50)',   // apricot
  'rgba(184,168,204,0.42)',   // lavender
  'rgba(140,110,90,0.22)',
];

for (let i = 0; i < numDust; i++) {
  const d = document.createElement('div');
  d.className = 'dust';
  const size = Math.random() * 3 + 1.2;
  d.style.width = size + 'px';
  d.style.height = size + 'px';
  d.style.left = Math.random() * 100 + 'vw';
  d.style.top = Math.random() * 100 + 'vh';
  d.style.background = dustTints[Math.floor(Math.random() * dustTints.length)];
  d.style.setProperty('--opa', (0.30 + Math.random() * 0.55).toFixed(2));
  d.style.setProperty('--dx1', (Math.random() * 80 - 40).toFixed(0) + 'px');
  d.style.setProperty('--dy1', (Math.random() * 80 - 40).toFixed(0) + 'px');
  d.style.setProperty('--dx2', (Math.random() * 100 - 50).toFixed(0) + 'px');
  d.style.setProperty('--dy2', (Math.random() * 100 - 50).toFixed(0) + 'px');
  d.style.setProperty('--dx3', (Math.random() * 80 - 40).toFixed(0) + 'px');
  d.style.setProperty('--dy3', (Math.random() * 80 - 40).toFixed(0) + 'px');
  d.style.setProperty('--dur', (14 + Math.random() * 18).toFixed(0) + 's');
  d.style.setProperty('--delay', (Math.random() * 14).toFixed(1) + 's');
  particles.appendChild(d);
}

// petals — small organic shapes drifting top-to-bottom
const petalSVG = (color) => `
  <svg width="14" height="18" viewBox="0 0 14 18" fill="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M7 1 C 11 4, 13 9, 11 14 C 9.5 17, 4.5 17, 3 14 C 1 9, 3 4, 7 1 Z" fill="${color}" opacity="0.55"/>
  </svg>`;

const petalColors = ['#F2D5D2', '#F5D5BC', '#DCD3E8', '#F4E5C8'];

for (let i = 0; i < numPetals; i++) {
  const p = document.createElement('div');
  p.className = 'petal';
  p.innerHTML = petalSVG(petalColors[Math.floor(Math.random() * petalColors.length)]);
  p.style.left = Math.random() * 100 + 'vw';
  p.style.top = '-40px';
  p.style.setProperty('--dx', (Math.random() * 200 - 100).toFixed(0) + 'px');
  p.style.setProperty('--rot', (Math.random() * 540 - 270).toFixed(0) + 'deg');
  p.style.setProperty('--dur', (24 + Math.random() * 18).toFixed(0) + 's');
  p.style.setProperty('--delay', (Math.random() * 30).toFixed(1) + 's');
  particles.appendChild(p);
}

// ============ CURSOR ============
const cursor = document.getElementById('cursor');
let mouseX = window.innerWidth / 2, mouseY = window.innerHeight / 2;
let dotX = mouseX, dotY = mouseY;
document.addEventListener('mousemove', (e) => {
  mouseX = e.clientX;
  mouseY = e.clientY;
});
function animateCursor() {
  dotX += (mouseX - dotX) * 0.18;
  dotY += (mouseY - dotY) * 0.18;
  cursor.style.transform = `translate(${dotX}px, ${dotY}px)`;
  requestAnimationFrame(animateCursor);
}
animateCursor();

const triggers = document.querySelectorAll('[data-cursor]');
triggers.forEach(el => {
  el.addEventListener('mouseenter', () => {
    cursor.classList.add('expanded');
    cursor.textContent = el.dataset.cursorText || '';
  });
  el.addEventListener('mouseleave', () => {
    cursor.classList.remove('expanded');
    cursor.textContent = '';
  });
});

// ============ LETTER DISPERSION ============
// Wraps each character of [data-text] target in a span so we can transform individually.
function splitText(el) {
  const text = el.dataset.text || el.textContent;
  el.textContent = '';
  for (let i = 0; i < text.length; i++) {
    const c = text[i];
    const span = document.createElement('span');
    span.className = 'ch' + (c === ' ' ? ' space' : '');
    span.textContent = c === ' ' ? '\u00A0' : c;
    el.appendChild(span);
  }
}
const headline = document.getElementById('headline');
const quote = document.getElementById('quote');
splitText(headline);
splitText(quote);

// disperse based on cursor proximity
const dispersibleChars = document.querySelectorAll('.ch:not(.space)');
const DISPERSE_RADIUS = 130;
const DISPERSE_MAX = 18; // max px displacement
const BLUR_MAX = 1.6;

function updateDispersion() {
  dispersibleChars.forEach(ch => {
    const r = ch.getBoundingClientRect();
    const cx = r.left + r.width / 2;
    const cy = r.top + r.height / 2;
    const dx = mouseX - cx;
    const dy = mouseY - cy;
    const dist = Math.sqrt(dx * dx + dy * dy);

    if (dist < DISPERSE_RADIUS) {
      // strength: 1 at center, 0 at edge
      const strength = 1 - (dist / DISPERSE_RADIUS);
      // direction: away from cursor (use unit vector, negate)
      const angle = Math.atan2(dy, dx);
      const offsetX = -Math.cos(angle) * DISPERSE_MAX * strength;
      const offsetY = -Math.sin(angle) * DISPERSE_MAX * strength;
      const blur = BLUR_MAX * strength;
      const fade = 1 - (strength * 0.35);
      ch.style.transform = `translate(${offsetX.toFixed(2)}px, ${offsetY.toFixed(2)}px)`;
      ch.style.filter = `blur(${blur.toFixed(2)}px)`;
      ch.style.opacity = fade.toFixed(3);
    } else {
      ch.style.transform = '';
      ch.style.filter = '';
      ch.style.opacity = '';
    }
  });
  requestAnimationFrame(updateDispersion);
}
updateDispersion();

// ============ CTA TRANSITION ============
const cta = document.getElementById('cta');
cta.addEventListener('click', (e) => {
  e.preventDefault();
  // gentle fade transition
  document.body.style.transition = 'background 1.1s ease, color 1.1s ease';
  document.body.style.background = '#FAFAF7';
  document.body.style.color = '#1A1A1A';
  cursor.style.transition = 'background 0.9s ease, box-shadow 0.9s ease';
  cursor.style.background = '#D8A0A6';
  cursor.style.boxShadow = '0 4px 16px rgba(216,160,166,0.35)';
  setTimeout(() => {
    alert('In the real build, this navigates to /home (the cream homepage with sidebar).');
    // restore demo state
    document.body.style.background = '';
    document.body.style.color = '';
    cursor.style.background = '';
    cursor.style.boxShadow = '';
  }, 1100);
});

// ============ CLOCK ============
function updateClock() {
  const now = new Date();
  const h = String(now.getHours()).padStart(2, '0');
  const m = String(now.getMinutes()).padStart(2, '0');
  const s = String(now.getSeconds()).padStart(2, '0');
  document.getElementById('clock').textContent = `${h}:${m}:${s}`;
}
updateClock();
setInterval(updateClock, 1000);
</script>
</body>
</html>
